name: Testes

# Suíte pytest mockada (sem hardware/rede/diálogos reais) rodando nas duas plataformas
# oficialmente suportadas (Windows/macOS — ver CLAUDE.md). QT_QPA_PLATFORM=offscreen já é
# fixado em tests/conftest.py, então não é preciso Xvfb nem display real.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Instalar dependências (uv sync)
        run: uv sync

      - name: Rodar testes
        run: uv run pytest
